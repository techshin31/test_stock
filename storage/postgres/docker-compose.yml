services:
  ############################################################
  # PostgreSQL
  ############################################################
  postgres:
    image: postgres:16                  # PostgreSQL 16  이미지
    container_name: postgres-db         # 컨테이너 이름
    restart: always                     # 컨테이너 비정상 종료 시 항상 재시작

    environment:
      # PostgreSQL 기본 계정 정보
      POSTGRES_USER: admin               # PostgreSQL 접속 사용자 이름
      POSTGRES_PASSWORD: admin1234        # PostgreSQL 접속 비밀번호
      POSTGRES_DB: quantpilot_db          # 기본으로 생성할 데이터베이스 이름

    ports:
      - "5432:5432"                      # 호스트 포트:컨테이너 포트 (기본 PostgreSQL 포트 5432)
      
    volumes:
      # PostgreSQL 데이터 영속화 (컨테이너 재시작 시에도 데이터 유지)
      - ./database:/var/lib/postgresql/data
      # 최초 DB 초기화 시 SQL 실행 (파일명 순서대로 실행)
      - ./schema/01_codes_schema.sql:/docker-entrypoint-initdb.d/01_codes_schema.sql:ro
      - ./schema/02_codes_seed.sql:/docker-entrypoint-initdb.d/02_codes_seed.sql:ro
      - ./schema/03_user_schema.sql:/docker-entrypoint-initdb.d/03_user_schema.sql:ro
      - ./schema/04_trader_schema.sql:/docker-entrypoint-initdb.d/04_trader_schema.sql:ro
      - ./schema/05_market_data_schema.sql:/docker-entrypoint-initdb.d/05_market_data_schema.sql:ro
      - ./schema/06_fa_analysis_schema.sql:/docker-entrypoint-initdb.d/06_fa_analysis_schema.sql:ro
      - ./schema/07_strategy_seed.sql:/docker-entrypoint-initdb.d/07_strategy_seed.sql:ro

